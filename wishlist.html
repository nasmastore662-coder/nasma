<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#C4A882">
  <title>قائمة المفضلة — نسما</title>

  <!-- Web App Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- DNS Prefetch & Preconnect -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    @media (max-width: 640px) {
      .products-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: var(--space-3);
      }
    }
  </style>
</head>
<body>

<div id="nasma-header"></div>

<main>
  <section class="section-padding" style="padding-top:var(--space-8);">
    <div class="container">
      
      <!-- مسار التنقل -->
      <nav class="breadcrumb page-breadcrumb" aria-label="مسار التنقل">
        <a href="index.html" class="breadcrumb-item">الرئيسية</a>
        <span class="breadcrumb-sep">›</span>
        <span class="breadcrumb-current">المفضلة</span>
      </nav>

      <div class="section-header" style="text-align:right;margin-bottom:var(--space-8);">
        <h1 class="section-title" style="text-align:right;">قائمة أمنياتي</h1>
        <p class="section-desc" style="margin-right:0;">القطع المفضلة التي قمتِ بحفظها لتتألقي بها لاحقاً</p>
      </div>

      <!-- شبكة المنتجات المفضلة -->
      <div class="products-grid" id="wishlist-grid" style="grid-template-columns:repeat(4,1fr);">
        <!-- توليد ديناميكي -->
      </div>

    </div>
  </section>
</main>

<div id="nasma-footer"></div>

<button class="scroll-top" id="scroll-top" aria-label="العودة للأعلى" title="للأعلى">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <polyline points="18 15 12 9 6 15"/>
  </svg>
</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="data.js"></script>
<script src="store.js"></script>
<script>
  'use strict';

  document.addEventListener('DOMContentLoaded', () => {
    NasmaStore.initPage('wishlist');
    renderWishlist();

    // الاستماع لأي تغييرات تحدث على المفضلة من داخل نفس الصفحة
    window.addEventListener('nasma:wishlist-updated', () => {
      renderWishlist();
    });
  });

  function renderWishlist() {
    const list = NasmaDB.WishlistDB.getProducts();
    const container = document.getElementById('wishlist-grid');
    if (!container) return;

    if (!list.length) {
      container.innerHTML = NasmaStore.buildEmptyState('لم تقومي بحفظ أي منتجات في المفضلة بعد.');
      return;
    }

    container.innerHTML = list.map((item, idx) => {
      return NasmaStore.buildProductCard(item, idx);
    }).join('');

    NasmaStore.initScrollAnimations();
  }
</script>

<!-- Service Worker Registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>

</body>
</html>
